<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esfera Pneuma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #ffd700;
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 1rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            max-width: 90vw;
            max-height: 90vh;
            gap: 1.5rem;
        }

        .sphere {
            width: clamp(120px, 20vw, 200px);
            height: clamp(120px, 20vw, 200px);
            background: radial-gradient(circle at 30% 30%, #ffd700, #ffaa00, #cc8800);
            border-radius: 50%;
            box-shadow: 
                0 0 30px #ffd700,
                0 0 60px #ffd700,
                0 0 90px #ffd700,
                inset 0 0 30px rgba(255, 215, 0, 0.6);
            animation: explode 2s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes explode {
            0%, 100% {
                transform: scale(1) rotate(0deg);
                box-shadow: 
                    0 0 30px #ffd700,
                    0 0 60px #ffd700,
                    0 0 90px #ffd700;
            }
            25% {
                transform: scale(1.15) rotate(5deg);
            }
            50% {
                transform: scale(1.3) rotate(0deg);
                box-shadow: 
                    0 0 50px #ffd700,
                    0 0 100px #ffd700,
                    0 0 150px #ffd700,
                    inset 0 0 50px rgba(255, 215, 0, 0.8);
            }
            75% {
                transform: scale(1.15) rotate(-5deg);
            }
        }

        h1 {
            font-size: clamp(2.5rem, 10vw, 6rem);
            font-weight: bold;
            text-shadow: 
                0 0 20px #ffd700,
                0 0 40px #ffd700;
            margin: 0;
            line-height: 1;
        }

        .subtitle {
            font-size: clamp(1.2rem, 5vw, 2rem);
            opacity: 0.9;
            text-shadow: 0 0 15px #ffd700;
            margin: 0;
            font-weight: 300;
        }

        .description {
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            line-height: 1.3;
            max-width: 500px;
            opacity: 0.8;
            text-shadow: 0 0 10px #ffd700;
            margin: 0;
        }

        .button {
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            color: #000;
            border: none;
            padding: clamp(0.8rem, 3vw, 1.2rem) clamp(2rem, 8vw, 4rem);
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 0 20px #ffd700,
                inset 0 0 20px rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .button:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 
                0 0 30px #ffd700,
                0 0 50px #ffd700,
                inset 0 0 30px rgba(255, 255, 255, 0.4);
        }

        @media (max-height: 600px) {
            .container {
                gap: 1rem;
                padding-top: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sphere"></div>
        <h1>Esfera Pneuma</h1>
        <h2 class="subtitle">O portal da energia vital</h2>
        <p class="description">Mergulhe na essência primordial do pneuma. Ative a esfera e desperte o poder infinito que pulsa no cerne do universo.</p>
        <a href="contrato.html" class="button" style="display: inline-block; text-decoration: none;">Ativar Esfera</a>
    </div>
</body>
</html>
