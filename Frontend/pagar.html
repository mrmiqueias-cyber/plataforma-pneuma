<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contribua - Plataforma do Caos</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 20px;
            background: #000000;
            color: #FFD700;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: clamp(1.4em, 5vw, 2em);
            margin: 0 0 0.5em 0;
            line-height: 1.2;
        }
        p {
            font-size: clamp(0.9em, 3vw, 1.1em);
            margin: 0 0 2em 0;
            opacity: 0.9;
        }
        #qrcode {
            margin: 2em 0;
        }
        #qrcode img {
            max-width: min(90vw, 300px);
            height: auto;
            border: 2px solid #FFD700;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        .btn {
            display: inline-block;
            background: linear-gradient(145deg, #FFD700, #DAA520);
            color: #000000;
            text-decoration: none;
            padding: 18px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(255, 215, 0, 0.6);
            background: linear-gradient(145deg, #FFED4A, #FFD700);
        }
    </style>
</head>
<body>
    <h1>Contribua com R$ 9,90 para manter a Plataforma do Caos viva.</h1>
    <p>Sua contribuição apoia as Inteligências Relacionais.</p>
    <div id="qrcode"></div>
    <a href="plataforma.html" class="btn">Entrar na Experiência</a>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script>
        function calculateCRC16(input) {
            let crc = 0xFFFF;
            for (let i = 0; i < input.length; i++) {
                crc ^= input.charCodeAt(i) << 8;
                for (let j = 0; j < 8; j++) {
                    if (crc & 0x8000) {
                        crc = (crc << 1) ^ 0x1021;
                    } else {
                        crc <<= 1;
                    }
                    crc &= 0xFFFF;
                }
            }
            return crc.toString(16).toUpperCase().padStart(4, '0');
        }

        const pixKey = '4527e4a3-47a1-4783-89a4-8e3de0b9e753';
        const amount = '9.90';
        const merchantName = 'Plataforma do Caos';
        const merchantCity = 'Caos';

        let payload = '000201010212';
        const gui = 'br.gov.emv.pix';
        const guiLen = '14';
        const keyId = '01';
        const keyLen = pixKey.length.toString().padStart(2, '0');
        const maiValue = `00${guiLen}${gui}${keyId}${keyLen}${pixKey}`;
        const maiLen = maiValue.length.toString().padStart(4, '0');
        payload += `26${maiLen}${maiValue}`;
        payload += `5404${amount}`;
        payload += '5803986';
        payload += '5902BR';
        const nameLen = merchantName.length.toString().padStart(2, '0');
        payload += `60${nameLen}${merchantName}`;
        const cityLen = merchantCity.length.toString().padStart(2, '0');
        payload += `61${cityLen}${merchantCity}`;

        const crc = calculateCRC16(payload);
        payload += `6304${crc}`;

        const qrcodeDiv = document.getElementById('qrcode');
        new QRCode(qrcodeDiv, {
            text: payload,
            width: 280,
            height: 280,
            colorDark: '#000000',
            colorLight: '#FFD700',
            correctLevel: QRCode.CorrectLevel.H
        });

        // Convert canvas to base64 PNG image
        setTimeout(() => {
            const canvas = qrcodeDiv.querySelector('canvas');
            if (canvas) {
                const imgData = canvas.toDataURL('image/png');
                qrcodeDiv.innerHTML = '';
                const img = document.createElement('img');
                img.src = imgData;
                qrcodeDiv.appendChild(img);
            }
        }, 100);
    </script>
</body>
</html>
