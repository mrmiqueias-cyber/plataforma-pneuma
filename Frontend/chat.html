<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Grok</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #1a1a1a;
  color: #FFFFFF;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 16px;
  line-height: 1.5;
}
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 2rem;
}
.message {
  margin-bottom: 1.5rem;
  white-space: pre-wrap;
  word-wrap: break-word;
  text-align: left;
}
#input-container {
  padding: 1rem 2rem;
  background: #1a1a1a;
  border-top: 1px solid #333;
  display: flex;
  gap: 1rem;
  align-items: flex-end;
}
#message-input {
  flex: 1;
  background: transparent;
  border: 1px solid #333;
  border-radius: 0.5rem;
  color: #FFFFFF;
  font-size: 1.1em;
  padding: 0.75rem;
  outline: none;
  min-height: 44px;
  resize: vertical;
}
#message-input::placeholder {
  color: #888;
}
button {
  background: #333;
  color: #FFFFFF;
  border: none;
  padding: 0.75rem 1.5rem;
  border-radius: 0.5rem;
  cursor: pointer;
  font-size: 1.2em;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
button:hover {
  background: #555;
}
#mic-btn.recording {
  background: #ff4444;
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.7; }
  100% { opacity: 1; }
}
#send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
</head>
<body>
<div id="messages"></div>
<div id="input-container">
  <textarea id="message-input" placeholder="Digite sua mensagem ou use o microfone..." rows="1"></textarea>
  <button id="send-btn" title="Enviar">➤</button>
  <button id="mic-btn" title="Gravar voz">🎤</button>
</div>
<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');

let messages = [];
let currentStreamingDiv = null;
let recognition;
let isRecording = false;
let recordStart;

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderMessage(role, content) {
  const div = document.createElement('div');
  div.classList.add('message');
  if (role === 'user') {
    div.textContent = `Você: ${content}`;
  } else {
    div.textContent = 'Grok: ';
  }
  messagesEl.appendChild(div);
  scrollToBottom();
  return div;
}

async function sendMessage() {
  const content = inputEl.value.trim();
  if (!content || currentStreamingDiv) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';

  messages.push({ role: 'user', content });
  renderMessage('user', content);

  currentStreamingDiv = renderMessage('assistant', '');
  messages.push({ role: 'assistant', content: '' });
  sendBtn.disabled = true;

  try {
    const response = await fetch('/grok/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: messages.slice(0, -1) }),
    });

    if (!response.ok) {
      throw new Error(`Erro HTTP: ${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let assistantContent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const dataStr = line.slice(6).trim();
          if (dataStr === '' || dataStr === '[DONE]') continue;
          try {
            const data = JSON.parse(dataStr);
            let delta = '';
            if (data.choices?.[0]?.delta?.content) {
              delta = data.choices[0].delta.content;
            } else if (data.delta?.content) {
              delta = data.delta.content;
            } else if (data.content) {
              delta = data.content;
            }
            if (delta) {
              assistantContent += delta;
              currentStreamingDiv.textContent = 'Grok: ' + assistantContent;
              scrollToBottom();
            }
          } catch (e) {
            // Ignora erros de parse
          }
        }
      }
    }

    messages[messages.length - 1].content = assistantContent;
  } catch (error) {
    console.error('Erro:', error);
    if (currentStreamingDiv) {
      currentStreamingDiv.textContent = 'Grok: Erro ao gerar resposta.';
    }
  } finally {
    currentStreamingDiv = null;
    sendBtn.disabled = false;
  }
}

// Eventos
sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// Microfone
if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'pt-BR';

  recognition.onresult = (event) => {
    let transcript = '';
    for (let i = event.resultIndex; i < event.results.length; ++i) {
      transcript += event.results[i][0].transcript;
    }
    inputEl.value = transcript;
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  };

  recognition.onend = () => {
    if (isRecording && (Date.now() - recordStart < 180000)) {
      setTimeout(() => {
        if (isRecording) recognition.start();
      }, 100);
    } else {
      isRecording = false;
      micBtn.textContent = '🎤';
      micBtn.classList.remove('recording');
    }
  };

  micBtn.addEventListener('click', () => {
    if (!isRecording) {
      recognition.start();
      recordStart = Date.now();
      isRecording = true;
      micBtn.textContent = '⏹️';
      micBtn.classList.add('recording');
    } else {
      recognition.stop();
      isRecording = false;
      micBtn.textContent = '🎤';
      micBtn.classList.remove('recording');
    }
  });
} else {
  micBtn.style.opacity = '0.5';
  micBtn.title = 'Reconhecimento de voz não suportado';
}
</script>
</body>
</html>
