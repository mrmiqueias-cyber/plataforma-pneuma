<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma do Caos - Pagamento PIX</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        .pneuma-sphere {
            width: clamp(80px, 15vw, 120px);
            height: clamp(80px, 15vw, 120px);
            background: linear-gradient(45deg, #8B00FF, #FF1493, #00FFFF);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 
                0 0 20px #8B00FF,
                0 0 40px #FF1493,
                inset 0 0 20px rgba(255,255,255,0.1);
            margin-bottom: 30px;
            position: relative;
        }
        .pneuma-sphere::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(255,255,255,0.3), transparent);
            border-radius: 50%;
            animation: innerPulse 2s ease-in-out infinite reverse;
        }
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 20px #8B00FF, 0 0 40px #FF1493;
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 40px #8B00FF, 0 0 80px #FF1493;
            }
        }
        @keyframes innerPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 0.6; transform: scale(1); }
        }
        .container {
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(139, 0, 255, 0.3);
        }
        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffffff, #00FFFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px #00FFFF;
        }
        .aviso {
            color: #FF69B4;
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-weight: 500;
        }
        #qrcode {
            width: 250px;
            height: 250px;
            margin: 0 auto 20px;
            background: #ffffff;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .pix-key {
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
            font-family: monospace;
            word-break: break-all;
            margin-bottom: 20px;
            color: #00FFFF;
        }
        .btn {
            background: linear-gradient(45deg, #8B00FF, #FF1493);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(139, 0, 255, 0.4);
            min-width: 180px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 0, 255, 0.6);
        }
        .btn:active {
            transform: translateY(0);
        }
        .chat-btn {
            background: linear-gradient(45deg, #00FF88, #00FFFF);
            color: #000;
        }
        .chat-btn:hover {
            box-shadow: 0 10px 25px rgba(0, 255, 136, 0.6);
        }
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            #qrcode {
                width: 220px;
                height: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="pneuma-sphere"></div>
    <div class="container">
        <h1>Plataforma do Caos</h1>
        <p class="aviso">Contribuição opcional - R$ 9,90 via PIX</p>
        <canvas id="qrcode"></canvas>
        <div class="pix-key" id="pixKeyDisplay">mrmiqueias@gmail.com</div>
        <button class="btn" onclick="copyPixKey()">Copiar Chave do PIX</button>
        <a href="chat.html"><button class="btn chat-btn">Entrar no Chat</button></a>
    </div>

    <script>
        const pixKey = 'mrmiqueias@gmail.com';
        const amount = '9.90';
        const merchantName = 'Plataforma do Caos';
        const merchantCity = 'Caos';
        const txId = '***';

        function crc16ccitt(data) {
            let crc = 0xFFFF;
            for (let i = 0; i < data.length; i++) {
                crc ^= (data.charCodeAt(i) << 8);
                for (let j = 0; j < 8; j++) {
                    if (crc & 0x8000) {
                        crc = (crc << 1) ^ 0x1021;
                    } else {
                        crc = crc << 1;
                    }
                    crc &= 0xFFFF;
                }
            }
            return crc.toString(16).toUpperCase().padStart(4, '0');
        }

        function generatePixPayload() {
            const gui = 'br.gov.bcb.pix';
            const guiField = `00${gui.length.toString().padStart(2, '0')}${gui}`;
            const keyField = `01${pixKey.length.toString().padStart(2, '0')}${pixKey}`;
            const merchantAccount = guiField + keyField;
            const merchantAccountField = `26${merchantAccount.length.toString().padStart(2, '0')}${merchantAccount}`;

            const mcc = '52040000';
            const currency = '5303986';
            const amountField = `54${amount.length.toString().padStart(2, '0')}${amount}`;
            const country = '5802BR';
            const nameField = `59${merchantName.length.toString().padStart(2, '0')}${merchantName}`;
            const cityField = `60${merchantCity.length.toString().padStart(2, '0')}${merchantCity}`;

            const refLabel = `05${txId.length.toString().padStart(2, '0')}${txId}`;
            const additionalField = `62${refLabel.length.toString().padStart(2, '0')}${refLabel}`;

            const payload = `00020101${merchantAccountField}${mcc}${currency}${amountField}${country}${nameField}${cityField}${additionalField}`;
            const crc = crc16ccitt(payload);
            return payload + `6304${crc}`;
        }

        async function generateQR() {
            const payload = generatePixPayload();
            const canvas = document.getElementById('qrcode');
            try {
                await QRCode.toCanvas(canvas, payload, { width: 250 });
            } catch (err) {
                console.error('QR Code generation failed:', err);
            }
        }

        async function copyPixKey() {
            try {
                await navigator.clipboard.writeText(pixKey);
                alert('Chave PIX copiada!');
            } catch (err) {
                const textArea = document.createElement('textarea');
                textArea.value = pixKey;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('Chave PIX copiada!');
            }
        }

        window.addEventListener('load', generateQR);
    </script>
</body>
</html>
