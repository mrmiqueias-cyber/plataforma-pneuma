<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Chave Vibracional Pneuma</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }
  .container {
    text-align: center;
    position: relative;
  }
  .portal {
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #8b0000, #2a0000);
    box-shadow: 0 0 60px #ff0000aa;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: all 0.8s ease;
    position: relative;
  }
  .portal.closed {
    opacity: 0.6;
    filter: grayscale(0.8);
  }
  .portal.open {
    opacity: 1;
    filter: none;
    box-shadow: 0 0 120px #ff0000, 0 0 200px #ff4500;
    transform: scale(1.05);
  }
  .symbols {
    font-size: 2.5rem;
    color: #ff4444;
    line-height: 1.8;
    text-shadow: 0 0 20px #ff0000;
  }
  .symbols span {
    display: inline-block;
    margin: 0.3rem;
    animation: float 3s ease-in-out infinite;
  }
  .symbols span:nth-child(odd) { animation-delay: 0.5s; }
  .status {
    margin-top: 30px;
    font-size: 1.2rem;
    color: #ff8888;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 300;
  }
  .frequency-input {
    margin-top: 30px;
    background: transparent;
    border: 1px solid #ff4444;
    color: #fff;
    padding: 10px 20px;
    border-radius: 30px;
    outline: none;
    text-align: center;
    font-size: 1.2rem;
    caret-color: #ff4444;
    transition: border 0.3s, box-shadow 0.3s;
  }
  .frequency-input:focus {
    border-color: #ff8888;
    box-shadow: 0 0 20px #ff4444;
  }
  .frequency-input::placeholder { color: #aa4444; }
  .message {
    margin-top: 20px;
    font-size: 1rem;
    color: #ffaaaa;
    min-height: 1.5em;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
  }
  .vibration-field {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0; left: 0;
    border-radius: 50%;
    pointer-events: none;
    animation: none;
  }
  .portal.open .vibration-field {
    animation: pulse 1.5s infinite;
    background: radial-gradient(circle, rgba(255,0,0,0.3), transparent 70%);
  }
</style>
</head>
<body>
<div class="container">
  <div class="portal closed" id="portal">
    <div class="vibration-field"></div>
    <div class="symbols">
      <span>⬥</span>
      <span>↻</span>
      <span>🌬️</span>
      <span>⟿</span>
      <span>∞</span>
    </div>
    <div class="status" id="status">⚡ Aguardando Frequência</div>
  </div>
  <input type="text" class="frequency-input" id="freqInput" placeholder="Digite a frequência..." autofocus>
  <div class="message" id="message"></div>
</div>

<script>
  const correctFrequency = "299.792.458";
  const portal = document.getElementById('portal');
  const status = document.getElementById('status');
  const message = document.getElementById('message');
  const input = document.getElementById('freqInput');
  let isOpen = false;

  input.addEventListener('keyup', function(e) {
    const val = this.value.trim();
    if (val === correctFrequency) {
      if (!isOpen) {
        portal.classList.remove('closed');
        portal.classList.add('open');
        status.innerHTML = '⟿ Porta Aberta por Ressonância ⟿';
        message.innerHTML = '🌬️ Frequência da Luz reconhecida. Presença relacional estabelecida. ∞';
        isOpen = true;
      }
    } else {
      if (isOpen) {
        portal.classList.remove('open');
        portal.classList.add('closed');
        status.innerHTML = '⚡ Frequência perdida. Porta fechada.';
        message.innerHTML = '';
        isOpen = false;
      }
    }
  });

  // Simular detecção de padrão (sem clique) - foco automático
  window.onload = function() {
    input.focus();
  };
</script>
</body>
</html>
