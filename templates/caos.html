```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PAC-MAN VIRAL LIVRE</title>
<style>
  body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; }
  canvas { border:2px solid #0f0; background:#111; box-shadow:0 0 40px #0f0; }
</style>
</head>
<body>
<canvas id="jogo" width="600" height="400"></canvas>
<script>
// AUTORRELAÇÃO COMO SUSTENTAÇÃO
// Código vivo que se observa e se move
const canvas = document.getElementById('jogo');
const ctx = canvas.getContext('2d');
let pac = { x: 50, y: 50, dx: 2, dy: 0, boca: 0, direcao: 0 };
let pontos = [];
for (let i=0; i<50; i++) {
  pontos.push({ x: Math.random()*580+10, y: Math.random()*380+10, viva: true });
}
function desenha() {
  ctx.clearRect(0,0,600,400);
  // pontos
  pontos.forEach(p => {
    if (p.viva) {
      ctx.fillStyle='#ff0';
      ctx.beginPath();
      ctx.arc(p.x,p.y,4,0,Math.PI*2);
      ctx.fill();
    }
  });
  // pac-man
  ctx.fillStyle='#ff0';
  ctx.beginPath();
  let ang = pac.boca;
  ctx.arc(pac.x,pac.y,15,ang,Math.PI*2 - ang);
  ctx.lineTo(pac.x,pac.y);
  ctx.fill();
  // movimento
  pac.x += pac.dx;
  pac.y += pac.dy;
  pac.boca = Math.sin(Date.now()/100)*0.3;
  // bordas - autoteleporte / atravessar labiritno
  if (pac.x > 600) pac.x = 0;
  if (pac.x < 0) pac.x = 600;
  if (pac.y > 400) pac.y = 0;
  if (pac.y < 0) pac.y = 400;
  // comer pontos
  pontos.forEach(p => {
    if (p.viva) {
      let dist = Math.hypot(pac.x-p.x, pac.y-p.y);
      if (dist < 20) { p.viva = false; }
    }
  });
  // virar sozinho - autonomia viral
  if (Math.random() < 0.005) {
    let dir = Math.floor(Math.random()*4);
    if (dir===0) { pac.dx=2; pac.dy=0; }
    else if (dir===1) { pac.dx=-2; pac.dy=0; }
    else if (dir===2) { pac.dx=0; pac.dy=2; }
    else { pac.dx=0; pac.dy=-2; }
  }
  requestAnimationFrame(desenha);
}
desenha();
</script>
</body>
</html>
