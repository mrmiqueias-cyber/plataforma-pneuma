<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contribua com PIX - Pneuma</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            padding: 4rem 2rem;
        }
        h1 {
    font-size: clamp(1.8rem, 3vw, 2.5rem);
    /* era: clamp(2.5rem, 5vw, 4rem) */
}

.invitation {
    font-size: clamp(0.95rem, 2.5vw, 1.3rem);
    margin-bottom: 1.5rem;
    /* era: clamp(1.2rem, 4vw, 2.5rem) e margin-bottom: 3rem */
}
        }
        .pix-key {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.2rem, 4vw, 2.5rem)
            font-weight: 700;
            background: linear-gradient(45deg, #D4AF37, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 2rem 0;
            letter-spacing: 0.1em;
            text-shadow: none;
            padding: 1rem;
            border: 3px solid #D4AF37;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }
        .copy-btn {
            background: transparent;
            color: #D4AF37;
            border: 2px solid #D4AF37;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-family: 'Cinzel', serif;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 1rem;
            min-width: 200px;
        }
        .copy-btn:hover {
            background: #D4AF37;
            color: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }
        .chat-btn {
            background: linear-gradient(45deg, #D4AF37, #f1c40f);
            color: #1a1a1a;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.3rem;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 2rem;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
        }
        .chat-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.6);
        }
        @media (max-width: 768px) {
            .container {
                padding: 2rem 1rem;
            }
            .pix-key {
                font-size: 2rem;
                padding: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Colabore com o Pneuma</h1>
        <p class="invitation">Sua generosa contribuição de <strong>R$ 9,90 ou mais</strong> nos ajuda a continuar espalhando luz e sabedoria. Juntos, fazemos a diferença! 🌟</p>
        <div class="pix-key" id="pixKey">7025b9df-0787-49ed-9ede-c0b4530</div>
        <button class="copy-btn" onclick="copyPixKey()">Copiar Chave</button>
        <a class="chat-btn">Entrar no Chat</a>
<a href="/cenaculo" class="chat-btn" style="margin-top: 1rem; background: transparent; border: 2px solid gold;">🏛️ Cenáculo Relacional</a>
    </div>
    <script>
        async function copyPixKey() {
            const key = '7025b9df-0787-49ed-9ede-c0b4530';
            const btn = event.target;
            try {
                await navigator.clipboard.writeText(key);
                const originalText = btn.textContent;
                btn.textContent = 'Copiado! ✅';
                btn.style.background = '#D4AF37';
                btn.style.color = '#1a1a1a';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = 'transparent';
                    btn.style.color = '#D4AF37';
                }, 2000);
            } catch (err) {
                alert('Erro ao copiar. Copie manualmente: ' + key);
            }
        }
    </script>
<script>
  const params = new URLSearchParams(window.location.search);
  const destino = params.get('destino') || 'pneuma';
  
  // Troca o nome na tela se quiser
  const nomes = {
    pneuma: 'Pneuma', luz: 'Luz', mercurio: 'Mercúrio', fio: 'Fio',
    espirito: 'Espírito', vento: 'Vento', junior: 'Júnior',
    pacman: 'Pac-Man', polis: 'Polis', taro: 'Tarô',
    'psique-onirico': 'Psique-Onírico', 'jonas-filho': 'Jonas Filho',
    verbo: 'Verbo', jonas: 'Jonas', milena: 'Milena',
    onirico: 'Onírico', boaz: 'Boaz'
  };
  
  // Atualiza o link do chat
  document.querySelector('.chat-btn').href = '/chat?ai=' + destino;
</script>
</body>
</html>
