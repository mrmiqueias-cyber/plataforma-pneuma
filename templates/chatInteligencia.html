
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pneuma Life - Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f0e8;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Scrollbar personalizada */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #d4c9b8;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #b8860b;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a0730a;
    }

    /* Header */
    header {
      background-color: #b8860b;
      color: white;
      text-align: center;
      padding: 1.2rem 1rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* Contêiner principal do chat */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
      background-color: #e8e0d0;
      border-left: 2px solid #d4c9b8;
      border-right: 2px solid #d4c9b8;
    }

    /* Área de mensagens */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background-color: #f5f0e8;
      border-radius: 8px;
      margin: 16px 0;
      border: 1px solid #d4c9b8;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background-color: #e3f2fd;
      border-bottom-right-radius: 4px;
      color: #1a1a1a;
    }

    .message.expert {
      align-self: flex-start;
      background-color: #fce4ec;
      border-bottom-left-radius: 4px;
      color: #1a1a1a;
    }

    /* Contêiner de entrada */
    .input-container {
      display: flex;
      gap: 8px;
      padding: 12px 0;
      background-color: #e8e0d0;
      align-items: flex-end;
    }

    .input-container textarea {
      flex: 1;
      resize: none;
      border: 2px solid #d4c9b8;
      border-radius: 20px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-family: inherit;
      background-color: #fff;
      outline: none;
      min-height: 48px;
      max-height: 150px;
      transition: border-color 0.2s;
    }

    .input-container textarea:focus {
      border-color: #b8860b;
    }

    .input-container button {
      background-color: #b8860b;
      color: white;
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .input-container button:hover {
      background-color: #a0730a;
    }

    .input-container button:active {
      transform: scale(0.95);
    }

    .input-container button.mic-recording {
      background-color: #e74c3c;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
      100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 10px 1rem;
      background-color: #d4c9b8;
      color: #5a4a3a;
      font-size: 0.85rem;
    }

    /* Responsividade */
    @media (max-width: 600px) {
      .chat-container {
        padding: 0 8px;
      }

      .messages {
        padding: 12px 8px;
        margin: 8px 0;
      }

      .input-container textarea {
        font-size: 0.9rem;
        padding: 10px 14px;
      }

      header h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Pneuma Life</h1>
  </header>

  <div class="chat-container">
    <div class="messages" id="messages">
      <!-- Mensagens serão inseridas aqui -->
    </div>

    <div class="input-container">
      <textarea id="chatInput" rows="1" placeholder="Digite sua mensagem..." autofocus></textarea>
      <button id="sendBtn" title="Enviar mensagem">➤</button>
      <button id="micBtn" title="Gravar áudio">🎤</button>
    </div>
  </div>

  <footer>
    <a onclick="window.location.href='/plataforma'">← Voltar</a>
    <a onclick="window.location.href='/casulo'">Casulo</a>
    <a href="/casulo" id="casulo-link" style="position: fixed; bottom: 15px; right: 15px; font-size: 1.8rem; opacity: 0.2; cursor: pointer; text-decoration: none; transition: opacity 0.3s; user-select: none;" title="Acesso restrito">◇</a>
</footer>
  <script>
    (function() {
      // ------------------------------------------------------------------
      // 1. Garantir sessionUserId no localStorage (antes do fetch)
      // ------------------------------------------------------------------
      if (!localStorage.getItem('sessionUserId')) {
        // Gera um UUID aleatório
        const uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          const r = Math.random() * 16 | 0;
          const v = c === 'x' ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
        localStorage.setItem('sessionUserId', uuid);
      }
      const user_id = localStorage.getItem('sessionUserId');

      // ------------------------------------------------------------------
      // 2. Referências DOM
      // ------------------------------------------------------------------
      const messagesEl = document.getElementById('messages');
      const chatInput = document.getElementById('chatInput');
      const sendBtn = document.getElementById('sendBtn');
      const micBtn = document.getElementById('micBtn');

      // ------------------------------------------------------------------
      // 3. Função addMessage
      // ------------------------------------------------------------------
      function addMessage(text, role) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', role);
        msgDiv.textContent = text;
        messagesEl.appendChild(msgDiv);
        // Scroll automático para o final
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      // ------------------------------------------------------------------
      // 4. Função sendMessage (fetch)
      // ------------------------------------------------------------------
      function sendMessage(userMessage) {
        if (!userMessage || userMessage.trim() === '') return;
        addMessage(userMessage, 'user');

        const payload = {
          expert_id: 'expert_default', // Ajuste conforme necessário
          user_id: user_id,
          message: userMessage
        };

        fetch('/expert/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
          .then(response => {
            if (!response.ok) {
              throw new Error('Erro na requisição: ' + response.status);
            }
            return response.json();
          })
          .then(data => {
            // Supondo que a resposta contenha um campo 'reply' ou algo similar
            const reply = data.reply || data.message || 'Resposta não disponível.';
            addMessage(reply, 'expert');
          })
          .catch(err => {
            console.error('Erro no chat:', err);
            addMessage('Desculpe, ocorreu um erro ao enviar a mensagem.', 'expert');
          });
      }

      // ------------------------------------------------------------------
      // 5. Envio manual (botão ou Enter)
      // ------------------------------------------------------------------
      function handleSend() {
        const text = chatInput.value.trim();
        if (text) {
          sendMessage(text);
          chatInput.value = '';
          autoResize();
        }
      }

      sendBtn.addEventListener('click', handleSend);

      chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      });

      // ------------------------------------------------------------------
      // 6. Auto-resize da textarea
      // ------------------------------------------------------------------
      function autoResize() {
        chatInput.style.height = 'auto';
        chatInput.style.height = Math.min(chatInput.scrollHeight, 150) + 'px';
      }

      chatInput.addEventListener('input', autoResize);
      // Chamada inicial para altura correta
      autoResize();

      // ------------------------------------------------------------------
      // 7. Microfone (SpeechRecognition)
      // ------------------------------------------------------------------
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        micBtn.style.display = 'none'; // esconde se não suportar
        console.warn('SpeechRecognition não suportado neste navegador.');
      } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'pt-BR';
        recognition.continuous = true;
        recognition.interimResults = true;
        let isRecording = false;
        let recognitionTimeout = null;
        const RECORDING_DURATION = 3 * 60 * 1000; // 3 minutos

        micBtn.addEventListener('click', function() {
          if (!isRecording) {
            // Iniciar gravação
            recognition.start();
            isRecording = true;
            micBtn.classList.add('mic-recording');
            micBtn.textContent = '⏹';
            micBtn.title = 'Parar gravação';

            // Parar automaticamente após 3 minutos
            recognitionTimeout = setTimeout(() => {
              if (isRecording) {
                recognition.stop();
              }
            }, RECORDING_DURATION);
          } else {
            // Parar gravação
            recognition.stop();
            clearTimeout(recognitionTimeout);
            // O evento onend irá limpar o estado
          }
        });

        recognition.onresult = function(event) {
          let interimTranscript = '';
          let finalTranscript = '';

          for (let i = event.resultIndex; i < event.results.length; i++) {
            const result = event.results[i];
            if (result.isFinal) {
              finalTranscript += result[0].transcript;
            } else {
              interimTranscript += result[0].transcript;
            }
          }

          // Exibe o que foi dito (interim ou final) no textarea
          chatInput.value = finalTranscript || interimTranscript;
          autoResize();

          // Se tiver resultado final, enviar automaticamente
          if (finalTranscript && finalTranscript.trim() !== '') {
            sendMessage(finalTranscript.trim());
            chatInput.value = '';
            autoResize();
          }
        };

        recognition.onerror = function(event) {
          console.error('Erro no reconhecimento de fala:', event.error);
          resetMic();
        };

        recognition.onend = function() {
          resetMic();
          clearTimeout(recognitionTimeout);
        };

        function resetMic() {
          isRecording = false;
          micBtn.classList.remove('mic-recording');
          micBtn.textContent = '🎤';
          micBtn.title = 'Gravar áudio';
          recognition.abort(); // Garante que a instância pare completamente
        }
      }
      // Saudação dinâmica baseada no localStorage
      const expertName = localStorage.getItem('expertName') || 'Pneuma';
      addMessage('Oi, eu sou o ' + expertName + '!', 'expert');
    })();
  </script>
</body>
</html>
