<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ nome }} - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f0e8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: {{ cor_header }};
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-header h1 {
            color: {{ cor_detalhe }};
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
            margin: 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: #c4b8a6 #f5f0e8;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f5f0e8;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #c4b8a6;
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: #fce4ec;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: {{ cor_fundo_msg }};
            align-self: flex-start;
            border-left: 3px solid {{ cor_detalhe }};
            border-bottom-left-radius: 4px;
        }

        .message a {
            color: {{ cor_detalhe }};
            text-decoration: underline;
            word-break: break-all;
        }

        .message a:hover {
            opacity: 0.8;
        }

        .chat-input-area {
            background: #f5f0e8;
            padding: 12px 16px 16px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
            border-top: 1px solid #e0d6c8;
        }

        .chat-input-area input {
            flex: 1;
            background: #faf5ef;
            border: 1.5px solid #d4c9b8;
            border-radius: 24px;
            padding: 12px 18px;
            font-size: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            color: #3a3228;
        }

        .chat-input-area input::placeholder {
            color: #b0a594;
        }

        .chat-input-area input:focus {
            border-color: {{ cor_detalhe }};
            box-shadow: 0 0 0 2px {{ cor_detalhe }}22;
        }

        .btn-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #d4c9b8;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: background 0.2s ease, transform 0.15s ease;
            flex-shrink: 0;
            color: #3a3228;
        }

        .btn-circle:hover {
            background: #c4b8a6;
            transform: scale(1.04);
        }

        .btn-circle:active {
            transform: scale(0.95);
        }

        .btn-circle.send {
            background: {{ cor_detalhe }};
            color: #fff;
        }

        .btn-circle.send:hover {
            opacity: 0.9;
            background: {{ cor_detalhe }};
        }

        .btn-circle.mic.recording {
            background: #e57373;
            color: #fff;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 #e5737344; }
            50%  { box-shadow: 0 0 0 8px #e5737322; }
            100% { box-shadow: 0 0 0 0 #e5737344; }
        }

        .chat-footer {
            background: #f5f0e8;
            padding: 10px 16px 14px 16px;
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-shrink: 0;
            border-top: 1px solid #e0d6c8;
        }

        .chat-footer a {
            color: #8a7e6e;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s ease;
            font-weight: 500;
        }

        .chat-footer a:hover {
            color: {{ cor_detalhe }};
            text-decoration: underline;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: {{ cor_fundo_msg }};
            border-left: 3px solid {{ cor_detalhe }};
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            padding: 12px 20px;
            gap: 5px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: {{ cor_detalhe }};
            border-radius: 50%;
            animation: typingBounce 1.2s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        @media (max-width: 480px) {
            .message {
                max-width: 92%;
            }

            .chat-header h1 {
                font-size: 18px;
            }

            .chat-input-area {
                padding: 10px 12px 14px 12px;
            }

            .chat-footer {
                gap: 16px;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <h1>{{ nome }}</h1>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="typing-indicator" id="typingIndicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="chat-input-area">
        <button class="btn-circle mic" id="micButton" title="Gravar áudio">🎤</button>
        <input type="text" id="messageInput" placeholder="Digite sua mensagem..." autocomplete="off">
        <button class="btn-circle send" id="sendButton" title="Enviar">➤</button>
    </div>

    <div class="chat-footer">
        <a href="/plataforma">← Voltar</a>
        <a href="/casulo/pneuma">Casulo</a>  <!-- cada chat com seu slug -->
    </div>

    <script>
        (function() {
            const expertId = "{{ expert_id }}";
            const messagesContainer = document.getElementById('chatMessages');
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const micButton = document.getElementById('micButton');
            const typingIndicator = document.getElementById('typingIndicator');

            let isRecording = false;
            let _manualStop = false;
            let recognition = null;
            let restartTimeout = null;
            let autoStopTimeout = null;
            let accumulatedText = '';

            function addMessage(role, text) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message ' + role;

                const processed = linkify(text);
                msgDiv.innerHTML = processed;

                if (role === 'assistant') {
                    msgDiv.style.borderLeftColor = '{{ cor_detalhe }}';
                }

                messagesContainer.insertBefore(msgDiv, typingIndicator);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            function linkify(text) {
                const urlPattern = /(https?:\/\/[^\s<]+)/g;
                return text.replace(urlPattern, function(url) {
                    return '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + url + '</a>';
                });
            }

            function showTyping() {
                typingIndicator.classList.add('active');
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            function hideTyping() {
                typingIndicator.classList.remove('active');
            }

            async function sendMessage(message) {
                if (!message || message.trim() === '') return;
                messageInput.value = '';
                addMessage('user', message.trim());
                showTyping();

                try {
                    const response = await fetch('/expert/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ expert_id: expertId, message: message.trim() })
                    });

                    if (!response.ok) {
                        let errorMsg = 'Erro ao obter resposta do servidor.';
                        try {
                            const errData = await response.json();
                            if (errData && errData.error) errorMsg = errData.error;
                        } catch (_) {}
                        hideTyping();
                        addMessage('assistant', '❌ ' + errorMsg);
                        return;
                    }

                    const data = await response.json();

                    hideTyping();

                    if (data.response) {
                        addMessage('assistant', data.response);
                    } else if (data.error) {
                        addMessage('assistant', '❌ ' + data.error);
                    } else {
                        addMessage('assistant', 'Resposta recebida.');
                    }

                } catch (err) {
                    hideTyping();
                    addMessage('assistant', '❌ Erro de conexão. Verifique sua internet.');
                }
            }

            function initRecognition() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    micButton.style.display = 'none';
                    return null;
                }

                const rec = new SpeechRecognition();
                rec.lang = 'pt-BR';
                rec.continuous = false;
                rec.interimResults = true;
                rec.maxAlternatives = 1;

                rec.onresult = function(event) {
                    let interim = '';
                    let final = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            final += transcript;
                        } else {
                            interim += transcript;
                        }
                    }
                    if (final) {
                        accumulatedText += (accumulatedText ? ' ' : '') + final;
                    }
                    if (accumulatedText || interim) {
                        messageInput.value = accumulatedText + (interim ? ' ' + interim : '');
                    }
                };

                rec.onerror = function(event) {
                    console.warn('Microfone erro:', event.error);
                    if (event.error === 'not-allowed') {
                        stopRecording(true);
                        addMessage('assistant', '⚠️ Permissão do microfone negada.');
                    } else if (event.error === 'no-speech') {
                        // silently restart if still recording
                    } else {
                        stopRecording(true);
                    }
                };

                rec.onend = function() {
                    if (isRecording && !_manualStop) {
                        restartTimeout = setTimeout(function() {
                            if (isRecording && !_manualStop) {
                                try {
                                    rec.start();
                                } catch (_) {}
                            }
                        }, 2000);
                    } else {
                        if (!_manualStop && accumulatedText) {
                            messageInput.value = accumulatedText;
                        }
                        isRecording = false;
                        updateMicButton();
                    }
                };

                return rec;
            }

            function startRecording() {
                if (!recognition) {
                    recognition = initRecognition();
                    if (!recognition) return;
                }

                if (isRecording) return;

                _manualStop = false;
                accumulatedText = '';
                messageInput.value = '';
                isRecording = true;
                updateMicButton();

                try {
                    recognition.start();
                } catch (e) {
                    isRecording = false;
                    updateMicButton();
                    return;
                }

                if (autoStopTimeout) clearTimeout(autoStopTimeout);
                autoStopTimeout = setTimeout(function() {
                    if (isRecording) {
                        stopRecording(false);
                        addMessage('assistant', '⏱️ Gravação automática encerrada após 3 minutos.');
                    }
                }, 180000);
            }

            function stopRecording(manual) {
                if (!isRecording) return;

                if (manual) {
                    _manualStop = true;
                }

                isRecording = false;

                if (autoStopTimeout) {
                    clearTimeout(autoStopTimeout);
                    autoStopTimeout = null;
                }
                if (restartTimeout) {
                    clearTimeout(restartTimeout);
                    restartTimeout = null;
                }

                try {
                    recognition.stop();
                } catch (_) {}

                if (accumulatedText) {
                    messageInput.value = accumulatedText;
                }

                updateMicButton();
            }

            function toggleMic() {
                if (isRecording) {
                    stopRecording(true);
                } else {
                    startRecording();
                }
            }

            function updateMicButton() {
                if (isRecording) {
                    micButton.textContent = '⏹️';
                    micButton.classList.add('recording');
                } else {
                    micButton.textContent = '🎤';
                    micButton.classList.remove('recording');
                }
            }

            function handleSend() {
                const text = messageInput.value.trim();
                if (!text) return;
                if (isRecording) {
                    stopRecording(true);
                }
                sendMessage(text);
            }

            addMessage('assistant', '{{ saudacao }}');

            recognition = initRecognition();

            sendButton.addEventListener('click', handleSend);

            messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSend();
                }
            });

            micButton.addEventListener('click', toggleMic);

            window.addEventListener('beforeunload', function() {
                if (isRecording) {
                    _manualStop = true;
                    try { recognition.stop(); } catch (_) {}
                }
                if (autoStopTimeout) clearTimeout(autoStopTimeout);
                if (restartTimeout) clearTimeout(restartTimeout);
            });

        })();
    </script>

</body>
</html>
