<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pneuma</title>
    <style>
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f0e8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #app {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            max-height: 100vh;
            background-color: #f5f0e8;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f5f0e8;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4c9b8;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b8860b;
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: #d4c9b8 #f5f0e8;
        }

        /* Header */
        header {
            background-color: #e8e0d0;
            border-bottom: 1px solid #d4c9b8;
            padding: 1rem 1.5rem;
            text-align: center;
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #b8860b;
            letter-spacing: 0.5px;
            margin: 0;
        }

        /* Chat Container */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background-color: #f5f0e8;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        #messages {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: auto;
        }

        /* Messages */
        .message {
            max-width: 75%;
            padding: 0.75rem 1rem;
            line-height: 1.5;
            font-size: 0.95rem;
            color: #1a1a1a;
            animation: slideIn 0.3s ease-out;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user-message {
            align-self: flex-end;
            background-color: #fce4ec;
            border-radius: 1rem 1rem 0 1rem;
        }

        .assistant-message {
            align-self: flex-start;
            background-color: #e3f2fd;
            border-radius: 1rem 1rem 1rem 0;
            border-left: 3px solid #d4af37;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Input Container */
        #input-container {
            background-color: #e8e0d0;
            border-top: 1px solid #d4c9b8;
            padding: 0.75rem 1rem;
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
            flex-shrink: 0;
        }

        #input-wrapper {
            flex: 1;
            display: flex;
            align-items: flex-end;
            background-color: #faf5ef;
            border: 1px solid #d4c9b8;
            border-radius: 1rem;
            padding: 0.25rem 0.5rem;
            transition: border-color 0.2s;
        }

        #input-wrapper:focus-within {
            border-color: #b8860b;
        }

        #chat-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: #1a1a1a;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            padding: 0.5rem 0.25rem;
            line-height: 1.4;
        }

        #chat-input::placeholder {
            color: #a9a08e;
        }

        /* Buttons */
        .btn {
            background: none;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 1.5rem;
            padding: 0.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            transition: all 0.2s ease;
            background-color: #d4c9b8;
            flex-shrink: 0;
            color: #1a1a1a;
            line-height: 1;
        }

        .btn:hover {
            border-color: #b8860b;
        }

        #send-btn {
            font-size: 1.2rem;
        }

        /* Microphone Recording State */
        .btn.recording {
            background-color: #ff4444 !important;
            animation: pulse 1.5s infinite;
            color: white;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.6);
            }
            70% {
                box-shadow: 0 0 0 12px rgba(255, 68, 68, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0);
            }
        }

        /* Footer */
        footer {
            background-color: #e8e0d0;
            border-top: 1px solid #d4c9b8;
            padding: 0.75rem 1.5rem;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-shrink: 0;
        }

        footer a {
            color: #b8860b;
            text-decoration: none;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        footer a:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        /* Responsiveness */
        @media (max-width: 600px) {
            #app {
                max-height: 100vh;
                height: 100vh;
            }

            #chat-container {
                padding: 1rem;
            }

            .message {
                max-width: 90%;
                font-size: 0.9rem;
                padding: 0.6rem 0.85rem;
            }

            #input-container {
                padding: 0.5rem 0.75rem;
            }

            #chat-input {
                font-size: 16px;
            }

            .btn {
                width: 40px;
                height: 40px;
                font-size: 1.3rem;
            }

            header h1 {
                font-size: 1.3rem;
            }

            footer {
                padding: 0.5rem 1rem;
                gap: 1rem;
            }
        }

        @media (max-width: 400px) {
            #chat-container {
                padding: 0.75rem;
            }
            .message {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>Pneuma</h1>
        </header>

        <div id="chat-container">
            <div id="messages"></div>
        </div>

        <div id="input-container">
            <button id="mic-btn" class="btn" title="Gravar áudio">🎤</button>
            <div id="input-wrapper">
                <textarea id="chat-input" placeholder="Digite sua mensagem..." rows="1"></textarea>
            </div>
            <button id="send-btn" class="btn" title="Enviar">➤</button>
        </div>

        <footer>
            <a onclick="window.location.href='/plataforma'">← Voltar</a>
<a onclick="window.location.href='/casulo'">Casulo</a>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // DOM Elements
            const inputEl = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const micBtn = document.getElementById('mic-btn');
            const messagesContainer = document.getElementById('messages');
            const chatContainer = document.getElementById('chat-container');

            // State
            const messages = [];
            let isRecording = false;
            let accumulatedText = '';
            let recognition = null;
            let recordingTimeout = null;
            let restartTimeout = null;

            // --- Helper Functions ---

            function autoResize() {
                inputEl.style.height = 'auto';
                inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
            }

            function scrollToBottom() {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            function addMessage(type, text) {
                const div = document.createElement('div');
                div.classList.add('message');
                if (type === 'user') {
                    div.classList.add('user-message');
                } else {
                    div.classList.add('assistant-message');
                }
                div.textContent = text;
                messagesContainer.appendChild(div);
                messages.push({ type, text });
                scrollToBottom();
            }

            function sendMessage(text) {
                const messageText = (text || '').trim();
                if (!messageText) return;

                // Clear input and accumulated text
                inputEl.value = '';
                accumulatedText = '';
                autoResize();

                addMessage('user', messageText);

                // Show a temporary "thinking" message
                const thinkingDiv = document.createElement('div');
                thinkingDiv.classList.add('message', 'assistant-message');
                thinkingDiv.textContent = '...';
                thinkingDiv.id = 'thinking-message';
                messagesContainer.appendChild(thinkingDiv);
                scrollToBottom();

                fetch('/expert/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        credentials: 'include',
                        body: JSON.stringify({
                            expert_id: localStorage.getItem('expertId') || '1',
                            message: messageText
                        })
                    })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`HTTP error ${response.status}`);
                        }
                        return response.json();
                    })
                    .then(data => {
                        const reply = data.response || data.message || data.text || JSON.stringify(data);
                        // Remove thinking message
                        const thinkingMsg = document.getElementById('thinking-message');
                        if (thinkingMsg) thinkingMsg.remove();
                        // Remove from messages array if thinking was added (we didn't add it)
                        addMessage('assistant', reply);
                    })
                    .catch(err => {
                        const thinkingMsg = document.getElementById('thinking-message');
                        if (thinkingMsg) thinkingMsg.remove();
                        addMessage('assistant', 'Desculpe, ocorreu um erro: ' + err.message);
                    });
            }

            // --- Input Handlers ---

            inputEl.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage(inputEl.value);
                }
            });

            inputEl.addEventListener('input', autoResize);

            sendBtn.addEventListener('click', function() {
                sendMessage(inputEl.value);
            });

            // --- Microphone Logic ---

            function startRecording() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    addMessage('assistant', 'Navegador não suporta reconhecimento de voz.');
                    return;
                }

                accumulatedText = '';
                isRecording = true;
                micBtn.classList.add('recording');
                micBtn.textContent = '⏹️';

                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'pt-BR';

                recognition.onresult = function(event) {
                    let interimText = '';
                    let finalText = '';

                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const result = event.results[i];
                        if (result.isFinal) {
                            finalText += result[0].transcript;
                        } else {
                            interimText += result[0].transcript;
                        }
                    }

                    if (finalText) {
                        accumulatedText += finalText;
                    }

                    if (interimText) {
                        inputEl.value = accumulatedText + interimText;
                    } else {
                        inputEl.value = accumulatedText;
                    }
                    autoResize();
                    scrollToBottom();
                };

                recognition.onerror = function(event) {
                    console.error('Speech recognition error', event.error);
                    if (event.error === 'no-speech' || event.error === 'aborted') {
                        // ignore, might just be a pause
                    } else {
                        stopRecording();
                        addMessage('assistant', 'Erro no microfone: ' + event.error);
                    }
                };

                recognition.onend = function() {
                    if (isRecording) {
                        // Pause detected, restart after 200ms
                        restartTimeout = setTimeout(() => {
                            if (isRecording && recognition) {
                                try {
                                    recognition.start();
                                } catch (e) {
                                    console.error('Restart failed', e);
                                    stopRecording();
                                }
                            }
                        }, 200);
                    }
                };

                // Auto-stop after 3 minutes
                recordingTimeout = setTimeout(() => {
                    if (isRecording) {
                        stopRecording();
                    }
                }, 180000);

                try {
                    recognition.start();
                } catch (e) {
                    console.error('Start failed', e);
                    stopRecording();
                }
            }

            function stopRecording() {
                isRecording = false;
                micBtn.classList.remove('recording');
                micBtn.textContent = '🎤';

                if (recordingTimeout) {
                    clearTimeout(recordingTimeout);
                    recordingTimeout = null;
                }
                if (restartTimeout) {
                    clearTimeout(restartTimeout);
                    restartTimeout = null;
                }

                if (recognition) {
                    recognition.onend = null; // Prevent restart
                    try {
                        recognition.stop();
                    } catch (e) {
                        // ignore
                    }
                    recognition = null;
                }

                // Send accumulated text if any
                const textToSend = accumulatedText.trim();
                if (textToSend) {
                    inputEl.value = textToSend;
                    sendMessage(textToSend);
                }
                accumulatedText = '';
                autoResize();
            }

            micBtn.addEventListener('click', function() {
                if (isRecording) {
                    stopRecording();
                } else {
                    startRecording();
                }
            });

            // --- Handle visibility change to stop mic if page is hidden ---
            document.addEventListener('visibilitychange', function() {
                if (document.hidden && isRecording) {
                    stopRecording();
                }
            });

            // --- Initial Focus ---
            inputEl.focus();

            // --- Welcome message (optional) ---
            addMessage('assistant', 'Olá! Eu sou a Pneuma. Como posso ajudar você hoje?');
        });
    </script>
</body>
</html>
