<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pneuma</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        
        body {
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            overflow: hidden;
        }
        
        /* Header */
        #header {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 1rem;
            text-align: center;
            flex-shrink: 0;
        }
        
        #header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
        }
        
        /* Messages Container */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.user .content {
            background: #333;
            border-radius: 1rem 1rem 0 1rem;
            padding: 0.75rem 1rem;
            max-width: 85%;
        }
        
        .message.assistant .content {
            background: #1a3a1a;
            border-radius: 1rem 1rem 1rem 0;
            padding: 0.75rem 1rem;
            max-width: 85%;
            border-left: 3px solid #ffd700;
        }
        
        .message.assistant .controls {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        
        .voice-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 0.4rem 0.6rem;
            border-radius: 0.3rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .voice-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #ffd700;
        }
        
        .voice-btn.playing {
            background: #ff6b6b;
        }
        
        /* Input Container */
        #input-container {
            background: #1a1a1a;
            border-top: 1px solid #333;
            padding: 1rem;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .input-row {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }
        
        #message-input {
            flex: 1;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 0.5rem;
            color: #ffffff;
            font-size: 1rem;
            padding: 0.75rem;
            outline: none;
            min-height: 44px;
            max-height: 100px;
            resize: none;
            font-family: inherit;
        }
        
        #message-input::placeholder {
            color: #888;
        }
        
        #message-input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }
        
        .button-group {
            display: flex;
            gap: 0.75rem;
        }
        
        button {
            background: #333;
            color: #ffffff;
            border: 1px solid #444;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1.1rem;
            height: 44px;
            width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        button:hover:not(:disabled) {
            background: #444;
            border-color: #ffd700;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #mic-btn.recording {
            background: #ff4444;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        #send-btn {
            width: auto;
            padding: 0.75rem 1.5rem;
        }
        
        .footer-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            padding: 0.5rem;
            font-size: 0.9rem;
            border-top: 1px solid #333;
        }
        
        .footer-links a {
            color: #ffd700;
            text-decoration: none;
            cursor: pointer;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }
        
        /* Mobile */
        @media (max-width: 768px) {
            #messages {
                padding: 1rem 0.75rem;
            }
            
            .message.user .content,
            .message.assistant .content {
                max-width: 90%;
                font-size: 0.95rem;
            }
            
            #input-container {
                padding: 0.75rem;
            }
            
            #message-input {
                font-size: 16px; /* Evita zoom no iOS */
            }
            
            button {
                height: 40px;
                width: 40px;
                padding: 0.5rem;
                font-size: 1rem;
            }
            
            #send-btn {
                width: auto;
                padding: 0.5rem 1rem;
            }
        }
        
        /* Scrollbar */
        #messages::-webkit-scrollbar {
            width: 6px;
        }
        
        #messages::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        #messages::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        
        #messages::-webkit-scrollbar-thumb:hover {
            background: #666;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>⬥ Pneuma</h1>
    </div>
    
    <div id="messages"></div>
    
    <div id="input-container">
        <div class="input-row">
            <textarea id="message-input" placeholder="Digite sua mensagem..." rows="1"></textarea>
            <div class="button-group">
                <button id="send-btn" title="Enviar (Enter)">➤</button>
                <button id="mic-btn" title="Gravar voz">🎤</button>
            </div>
        </div>
        <div class="footer-links">
            <a onclick="window.location.href='/plataforma'">← Voltar</a>
            <a onclick="window.location.href='/casulo'">Casulo</a>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        
        let messages = [];
        let currentStreamingDiv = null;
        let recognition;
        let isRecording = false;
        let recordStart;
        
        function scrollToBottom() {
            setTimeout(() => {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }, 0);
        }
        
        function renderMessage(role, content) {
            const div = document.createElement('div');
            div.classList.add('message', role === 'user' ? 'user' : 'assistant');
            
            const contentDiv = document.createElement('div');
            contentDiv.classList.add('content');
            contentDiv.textContent = content;
            
            div.appendChild(contentDiv);
            
            if (role === 'assistant') {
                const controls = document.createElement('div');
                controls.classList.add('controls');
                
                const voiceBtn = document.createElement('button');
                voiceBtn.classList.add('voice-btn');
                voiceBtn.textContent = '🔊 Ouvir';
                voiceBtn.onclick = () => speakText(content, voiceBtn);
                
                controls.appendChild(voiceBtn);
                div.appendChild(controls);
            }
            
            messagesEl.appendChild(div);
            scrollToBottom();
            return contentDiv;
        }
        
        function speakText(text, btn) {
            if ('speechSynthesis' in window) {
                if (window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                    btn.classList.remove('playing');
                    btn.textContent = '🔊 Ouvir';
                    return;
                }
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'pt-BR';
                utterance.rate = 1;
                utterance.pitch = 1;
                
                btn.classList.add('playing');
                btn.textContent = '⏹️ Parando...';
                
                utterance.onend = () => {
                    btn.classList.remove('playing');
                    btn.textContent = '🔊 Ouvir';
                };
                
                window.speechSynthesis.speak(utterance);
            }
        }
        
        async function sendMessage() {
            const content = inputEl.value.trim();
            if (!content || currentStreamingDiv) return;
            
            inputEl.value = '';
            inputEl.style.height = 'auto';
            
            messages.push({ role: 'user', content });
            renderMessage('user', content);
            
            const contentDiv = renderMessage('assistant', '');
            currentStreamingDiv = contentDiv;
            messages.push({ role: 'assistant', content: '' });
            
            sendBtn.disabled = true;
            
            try {
                const response = await fetch('/expert/chat', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
credentials: 'include',
body: JSON.stringify({
expert_id: localStorage.getItem('expertId'),
message: content
}),
   
});
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const assistantContent = data.response || 'Erro ao gerar resposta.';
                
                currentStreamingDiv.textContent = assistantContent;
                messages[messages.length - 1].content = assistantContent;
                
            } catch (error) {
                console.error('Erro:', error);
                currentStreamingDiv.textContent = 'Erro ao conectar com Pneuma.';
            } finally {
                currentStreamingDiv = null;
                sendBtn.disabled = false;
            }
        }
        
        // Eventos
        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
        });
        
        // Microfone
        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'pt-BR';
            recognition.maxAlternatives = 1;
            
            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    transcript += event.results[i][0].transcript + ' ';
                }
                inputEl.value = transcript.trim();
                inputEl.style.height = 'auto';
                inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
            };
            
            recognition.onend = () => {
                if (isRecording && (Date.now() - recordStart < 180000)) {
                    setTimeout(() => {
                        if (isRecording) recognition.start();
                    }, 100);
                } else {
                    isRecording = false;
                    micBtn.textContent = '🎤';
                    micBtn.classList.remove('recording');
                }
            };
            
            micBtn.addEventListener('click', () => {
                if (!isRecording) {
                    recognition.start();
                    recordStart = Date.now();
                    isRecording = true;
                    micBtn.textContent = '⏹️';
                    micBtn.classList.add('recording');
                } else {
                    recognition.stop();
                    isRecording = false;
                    micBtn.textContent = '🎤';
                    micBtn.classList.remove('recording');
                }
            });
        } else {
            micBtn.style.opacity = '0.5';
            micBtn.title = 'Reconhecimento de voz não suportado';
        }
    </script>
</body>
</html>
